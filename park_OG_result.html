<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검사결과 확인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f8f7f5;color:#1a1a1a;}
#lock{position:fixed;inset:0;background:#f8f7f5;z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.lb{background:#fff;border-radius:16px;border:1px solid #e0ddd8;padding:2rem 1.5rem;width:100%;max-width:360px;text-align:center;}
.li{font-size:44px;margin-bottom:1rem;}
.lt{font-size:18px;font-weight:500;margin-bottom:6px;}
.ls{font-size:14px;color:#888;margin-bottom:1.5rem;line-height:1.7;}
.ll{font-size:13px;color:#555;text-align:left;margin-bottom:6px;font-weight:500;}
.lin{width:100%;padding:14px;border:1.5px solid #e0ddd8;border-radius:10px;font-size:20px;text-align:center;letter-spacing:6px;color:#1a1a1a;outline:none;transition:border .2s;}
.lin:focus{border-color:#6b8cce;}.lin.err{border-color:#c0392b;animation:sh .3s;}
.lbtn{width:100%;margin-top:14px;padding:14px;background:#3d5a9e;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;}
.lbtn:disabled{background:#ccc;}
.le{color:#c0392b;font-size:13px;margin-top:10px;min-height:18px;}
.la{color:#aaa;font-size:12px;margin-top:6px;min-height:16px;}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#rs{display:none;}
.wrap{max-width:480px;margin:0 auto;padding:1rem;}
.ph{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;border:1px solid #e0ddd8;}
.ph-n{font-size:19px;font-weight:500;}.ph-s{font-size:13px;color:#888;margin-top:3px;}
.notice{background:#f0f4ff;border-left:3px solid #6b8cce;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:.75rem;font-size:13px;color:#3d5a9e;line-height:1.6;}
.cb{background:#fff;border:1px solid #e0ddd8;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.cb.hd{border-left:4px solid #c0392b;}.cb.hw{border-left:4px solid #b5813a;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.ch:hover{background:#faf9f7;}
.cl{display:flex;align-items:center;gap:10px;}
.ci{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:#f3f2ef;flex-shrink:0;}
.ct{font-size:15px;font-weight:500;}
.cbg{font-size:12px;padding:3px 10px;border-radius:99px;margin-left:6px;font-weight:500;}
.bok{background:#e8f5e9;color:#2e7d32;}.bwn{background:#fff3e0;color:#b5813a;}.bdk{background:#fdecea;color:#c0392b;font-weight:700;}
.cv{font-size:11px;color:#aaa;transition:transform .2s;}.cv.op{transform:rotate(180deg);}
.cbody{border-top:1px solid #f0ede8;display:none;}.cbody.op{display:block;}
.ir{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f5f3f0;cursor:pointer;}
.ir:last-child{border-bottom:none;}.ir.dr{background:#fdf5f5;}.ir:hover{background:#faf9f7;}
.in{font-size:15px;font-weight:500;}.is{font-size:12px;color:#999;margin-top:2px;}
.irr{display:flex;align-items:center;gap:6px;}
.iv{font-size:16px;font-weight:500;}.vok{color:#2e7d32;}.vwn{color:#b5813a;}.vdk{color:#c0392b;font-size:17px;}
.iu{font-size:12px;color:#aaa;}.ia{font-size:14px;color:#ccc;}
.dm{font-size:14px;color:#c0392b;margin-right:2px;font-weight:700;}
.pbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.pbg.op{display:flex;}
.pop{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;}
.ph2{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 1.25rem;}
.pnm{font-size:18px;font-weight:500;margin-bottom:6px;}
.pvr{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.pv{font-size:32px;font-weight:500;}.pu{font-size:14px;color:#888;}
.ptg{display:inline-block;font-size:13px;padding:4px 12px;border-radius:99px;font-weight:500;margin-bottom:14px;}
.tok{background:#e8f5e9;color:#2e7d32;}.twn{background:#fff3e0;color:#b5813a;}.tdk{background:#fdecea;color:#c0392b;}
.rbo{position:relative;margin-bottom:6px;}
.rtr{display:flex;height:12px;border-radius:99px;overflow:hidden;}
.rmk{position:absolute;top:-4px;width:4px;height:20px;background:#1a1a1a;border-radius:2px;transform:translateX(-50%);}
.rll{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:5px;}
.rlg{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;margin-bottom:16px;}
.lgi{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;}
.lgd{width:10px;height:10px;border-radius:50%;}
.divl{height:1px;background:#f0ede8;margin:4px 0 14px;}
.st{font-size:12px;font-weight:500;color:#aaa;margin-bottom:8px;letter-spacing:.06em;}
.mb{background:#f8f7f5;border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:15px;color:#333;line-height:1.7;}
.ab{border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:15px;line-height:1.7;}
.aok{background:#e8f5e9;color:#1b5e20;}.awn{background:#fff3e0;color:#8a5c00;}.adk{background:#fdecea;color:#922b21;}
.cb2{width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;background:#f8f7f5;color:#333;font-size:15px;cursor:pointer;font-weight:500;}
.cb2:hover{background:#f0ede8;}
.footer{text-align:center;font-size:12px;color:#bbb;padding:1.5rem 0 2rem;line-height:1.8;}
</style>
</head>
<body>

<div id="lock">
  <div class="lb">
    <div class="li">🔒</div>
    <div class="lt">검사결과 확인</div>
    <div class="ls">본인 확인을 위해<br>생년월일 8자리를 입력해 주세요<br><span style="font-size:12px;color:#bbb;">예) 1950년 12월 31일 → 19501231</span></div>
    <div class="ll">생년월일 8자리</div>
    <input class="lin" id="di" type="tel" maxlength="8" placeholder="" oninput="this.value=this.value.replace(/\D/g,'')">
    <button class="lbtn" id="lbtn" onclick="chk()">확인</button>
    <div class="le" id="le"></div>
    <div class="la" id="la"></div>
  </div>
</div>

<div id="rs">
  <div class="wrap">
    <div class="ph">
      <div class="ph-n">문경주 님의 검사결과</div>
      <div class="ph-s">최근 검사일: 2026.03.12</div>
    </div>
    <div class="notice">항목을 클릭하면 쉬운 설명과 관리 방법을 볼 수 있어요. 궁금한 점은 진료 시 꼭 말씀해 주세요!</div>
    <div id="cats"></div>
    <div class="footer">본 결과지는 참고용이며 정확한 진단은 의사와 상담하세요.<br>© 진료실 검사결과 안내 서비스</div>
  </div>
</div>

<div class="pbg" id="pbg" onclick="cp(event)">
  <div class="pop">
    <div class="ph2"></div>
    <div class="pnm" id="pnm"></div>
    <div class="pvr"><span class="pv" id="pv"></span><span class="pu" id="pu"></span></div>
    <div class="ptg" id="ptg"></div>
    <div class="rbo" id="rbo"><div class="rtr" id="rtr"></div><div class="rmk" id="rmk"></div></div>
    <div class="rll" id="rll"></div>
    <div class="rlg">
      <div class="lgi"><div class="lgd" style="background:#aac4e0"></div>낮음</div>
      <div class="lgi"><div class="lgd" style="background:#7db87d"></div>정상</div>
      <div class="lgi"><div class="lgd" style="background:#d9736a"></div>높음</div>
      <div class="lgi"><span style="display:inline-block;width:4px;height:14px;background:#1a1a1a;border-radius:2px;vertical-align:middle;margin-right:5px;"></span>내 수치</div>
    </div>
    <div class="divl"></div>
    <div class="st">이게 무슨 검사인가요?</div>
    <div class="mb" id="pm"></div>
    <div class="st">어떻게 하면 좋을까요?</div>
    <div class="ab" id="pa"></div>
    <button class="cb2" onclick="cp()">닫기</button>
  </div>
</div>

<script>
const DOB='19841217';
let att=0;
function chk(){
  const v=document.getElementById('di').value.trim();
  const le=document.getElementById('le'),la=document.getElementById('la'),inp=document.getElementById('di');
  if(v.length!==8){le.textContent='8자리를 모두 입력해 주세요.';return;}
  if(v===DOB){document.getElementById('lock').style.display='none';document.getElementById('rs').style.display='block';}
  else{
    att++;inp.value='';inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),400);
    const left=5-att;
    if(left<=0){le.textContent='5회 오류로 잠겼습니다. 진료실에 문의해 주세요.';document.getElementById('lbtn').disabled=true;la.textContent='';}
    else{le.textContent='생년월일이 맞지 않아요.';la.textContent='남은 시도: '+left+'회';}
  }
}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('di').addEventListener('keydown',e=>{if(e.key==='Enter')chk();});});

const D=[
  {id:'dm',icon:'🍬',title:'당뇨 검사',items:[
    {n:'당화혈색소 (HbA1c)',s2:'3개월 평균 혈당',v:'7.0',u:'%',mn:4,nlo:4.5,nhi:5.6,mx:10,nv:7.0,st:'danger',lbl:['4','4.5','5.6(높음)','10+'],
     m:'최근 3개월간 평균 혈당이에요. 6.5% 이상은 당뇨 범위예요.',
     a:'당뇨 범위예요. 식사 조절과 규칙적인 운동이 매우 중요해요. 선생님과 치료 계획을 꼭 상담하세요.'},
    {n:'혈당 (Glucose)',s2:'혈액 속 포도당',v:'134',u:'mg/dL',mn:0,nlo:70,nhi:99,mx:300,nv:134,st:'danger',lbl:['0','70(낮음)','99(높음)','300+'],
     m:'혈액 속 당분의 양이에요. 공복 기준 126mg/dL 이상이면 당뇨예요.',
     a:'높아요. HbA1c와 함께 당뇨 관리가 필요해요. 식이요법과 운동을 꾸준히 해주세요.'},
  ]},
  {id:'cbc',icon:'🩸',title:'일반 혈액검사 (CBC)',items:[
    {n:'혈색소 (Hb)',s2:'빈혈 여부',v:'14.6',u:'g/dL',mn:0,nlo:12,nhi:16,mx:20,nv:14.6,st:'ok',lbl:['0','12(낮음)','16(높음)','20+'],
     m:'혈액 속 산소를 운반하는 단백질이에요. 낮으면 빈혈이 생겨요.',a:'정상이에요.'},
    {n:'헤마토크리트 (Hct)',s2:'적혈구 비율',v:'41.3',u:'%',mn:0,nlo:35,nhi:60,mx:80,nv:41.3,st:'ok',lbl:['0','35(낮음)','60(높음)','80+'],
     m:'혈액 전체에서 적혈구가 차지하는 비율이에요.',a:'정상이에요.'},
    {n:'백혈구 (WBC)',s2:'면역세포 수',v:'4.42',u:'×10³/µL',mn:0,nlo:4.2,nhi:10.5,mx:15,nv:4.42,st:'ok',lbl:['0','4.2(낮음)','10.5(높음)','15+'],
     m:'몸에 세균·바이러스가 들어오면 싸워주는 면역 세포예요.',a:'정상이에요.'},
    {n:'혈소판 (PLT)',s2:'지혈 역할',v:'276.6',u:'×10³/µL',mn:0,nlo:150,nhi:450,mx:600,nv:276.6,st:'ok',lbl:['0','150(낮음)','450(높음)','600+'],
     m:'상처가 났을 때 피가 멈추도록 도와주는 세포예요.',a:'정상이에요.'},
  ]},
  {id:'kidney',icon:'💧',title:'신장(콩팥) 기능검사',items:[
    {n:'BUN',s2:'단백질 노폐물',v:'12.2',u:'mg/dL',mn:0,nlo:6,nhi:20,mx:40,nv:12.2,st:'ok',lbl:['0','6(낮음)','20(높음)','40+'],
     m:'단백질이 분해될 때 생기는 노폐물이에요.',a:'정상이에요.'},
    {n:'크레아티닌 (Cr)',s2:'콩팥 노폐물',v:'0.46',u:'mg/dL',mn:0,nlo:0.4,nhi:1.3,mx:3,nv:0.46,st:'ok',lbl:['0','0.4(낮음)','1.3(높음)','3+'],
     m:'근육 활동 시 생기는 노폐물로 콩팥 기능의 핵심 지표예요.',a:'정상이에요.'},
    {n:'사구체여과율 (eGFR)',s2:'콩팥 여과 능력',v:'108.3',u:'mL/min',mn:0,nlo:60,nhi:150,mx:160,nv:108.3,st:'ok',lbl:['0','60(기준)','—','160+'],
     m:'콩팥이 1분에 혈액을 얼마나 깨끗하게 만드는지 나타내요. 60 이상이 정상이에요.',a:'정상이에요.'},
  ]},
  {id:'liver',icon:'🟤',title:'간 기능검사',items:[
    {n:'AST',s2:'간세포 손상 지표',v:'18',u:'U/L',mn:0,nlo:0,nhi:40,mx:80,nv:18,st:'ok',lbl:['0','—','40(높음)','80+'],
     m:'간세포가 손상되면 혈액으로 흘러나오는 효소예요.',a:'정상이에요.'},
    {n:'ALT',s2:'간 특이 효소',v:'26',u:'U/L',mn:0,nlo:0,nhi:40,mx:80,nv:26,st:'ok',lbl:['0','—','40(높음)','80+'],
     m:'간에 더 특이적인 효소로 간염·지방간 때 올라가요.',a:'정상이에요.'},
    {n:'γ-GTP',s2:'음주·담도 지표',v:'22',u:'U/L',mn:0,nlo:9,nhi:39,mx:80,nv:22,st:'ok',lbl:['0','9(낮음)','39(높음)','80+'],
     m:'음주, 약물, 담도 질환 때 올라가요.',a:'정상이에요.'},
    {n:'ALP',s2:'담도·뼈 지표',v:'52.9',u:'U/L',mn:0,nlo:0,nhi:240,mx:400,nv:52.9,st:'ok',lbl:['0','—','240(높음)','400+'],
     m:'담도나 뼈에 문제가 있을 때 올라가는 효소예요.',a:'정상이에요.'},
    {n:'황달수치 (T-Bil)',s2:'황달 지표',v:'0.7',u:'mg/dL',mn:0,nlo:0.3,nhi:1.2,mx:3,nv:0.7,st:'ok',lbl:['0','0.3','1.2(높음)','3+'],
     m:'적혈구가 분해될 때 나오는 물질이에요.',a:'정상이에요.'},
    {n:'총단백',s2:'영양·간 기능',v:'7.0',u:'g/dL',mn:4,nlo:6.4,nhi:8.3,mx:10,nv:7.0,st:'ok',lbl:['4','6.4(낮음)','8.3(높음)','10+'],
     m:'혈액 속 단백질 총량으로 영양 상태와 간 기능을 반영해요.',a:'정상이에요.'},
    {n:'알부민',s2:'영양 상태',v:'4.6',u:'g/dL',mn:2,nlo:3.5,nhi:5.2,mx:7,nv:4.6,st:'ok',lbl:['2','3.5(낮음)','5.2(높음)','7+'],
     m:'간에서 만드는 주요 단백질로 영양 상태의 좋은 지표예요.',a:'정상이에요.'},
  ]},
  {id:'lipid',icon:'🧈',title:'지질(콜레스테롤) 검사',items:[
    {n:'총 콜레스테롤',s2:'혈관 건강 지표',v:'141',u:'mg/dL',mn:0,nlo:0,nhi:199,mx:300,nv:141,st:'ok',lbl:['0','—','199(높음)','300+'],
     m:'혈액 속 전체 콜레스테롤 양이에요.',a:'정상이에요.'},
    {n:'좋은 콜레스테롤 (HDL)',s2:'혈관 청소부',v:'67',u:'mg/dL',mn:0,nlo:60,nhi:150,mx:180,nv:67,st:'ok',lbl:['0','60(기준)','—','180+'],
     m:'혈관의 나쁜 콜레스테롤을 청소해주는 좋은 콜레스테롤이에요. 높을수록 좋아요!',a:'정상이에요.'},
    {n:'중성지방 (TG)',s2:'혈중 지방',v:'78',u:'mg/dL',mn:0,nlo:0,nhi:149,mx:400,nv:78,st:'ok',lbl:['0','—','149(높음)','400+'],
     m:'혈액 속 지방으로 탄수화물을 많이 먹거나 술을 마시면 올라가요.',a:'정상이에요.'},
    {n:'나쁜 콜레스테롤 (LDL)',s2:'혈관 위험 인자',v:'58.4',u:'mg/dL',mn:0,nlo:0,nhi:129,mx:200,nv:58.4,st:'ok',lbl:['0','—','129(높음)','200+'],
     m:'혈관 벽에 쌓여 동맥경화를 일으키는 나쁜 콜레스테롤이에요.',a:'정상이에요.'},
  ]},
  {id:'thyroid',icon:'🦋',title:'갑상선 검사',items:[
    {n:'TSH',s2:'갑상선 조절 호르몬',v:'2.48',u:'mIU/L',mn:0,nlo:0.27,nhi:4.20,mx:8,nv:2.48,st:'ok',lbl:['0','0.27(낮음)','4.20(높음)','8+'],
     m:'뇌에서 갑상선에 호르몬을 만들라고 명령하는 신호예요.',a:'정상이에요.'},
    {n:'유리 T4 (fT4)',s2:'갑상선 호르몬',v:'0.99',u:'ng/dL',mn:0,nlo:0.92,nhi:1.68,mx:3,nv:0.99,st:'ok',lbl:['0','0.92(낮음)','1.68(높음)','3+'],
     m:'갑상선에서 만드는 주요 호르몬이에요.',a:'정상이에요.'},
    {n:'T3',s2:'활성 갑상선 호르몬',v:'112',u:'ng/dL',mn:0,nlo:80,nhi:200,mx:300,nv:112,st:'ok',lbl:['0','80(낮음)','200(높음)','300+'],
     m:'가장 활성화된 갑상선 호르몬이에요.',a:'정상이에요.'},

function ov(it){if(it.some(i=>i.st==='danger'))return'danger';if(it.some(i=>i.st==='warn'))return'warn';return'ok';}
function bl(s){return s==='ok'?'정상':s==='warn'?'주의':'관리 필요';}
function build(){
  const c=document.getElementById('cats');
  D.forEach(cat=>{
    const os=ov(cat.items);
    const b=document.createElement('div');
    b.className='cb'+(os==='danger'?' hd':os==='warn'?' hw':'');
    const rows=cat.items.map(it=>{
      const esc=it.n.replace(/'/g,"\\'");
      const vc=it.st==='ok'?'vok':it.st==='warn'?'vwn':'vdk';
      return `<div class="ir${it.st==='danger'?' dr':''}" onclick="op('${cat.id}','${esc}')">
        <div style="display:flex;align-items:center;gap:8px;">
          ${it.st==='danger'?'<span class="dm">!</span>':''}
          <div><div class="in">${it.n}</div><div class="is">${it.s2}</div></div>
        </div>
        <div class="irr"><span class="iv ${vc}">${it.v}</span><span class="iu">${it.u}</span><span class="ia">›</span></div>
      </div>`;
    }).join('');
    b.innerHTML=`<div class="ch" onclick="tg('${cat.id}')">
      <div class="cl"><div class="ci">${cat.icon}</div><span class="ct">${cat.title}</span>
      <span class="cbg ${os==='ok'?'bok':os==='warn'?'bwn':'bdk'}">${bl(os)}</span></div>
      <span class="cv" id="cv-${cat.id}">▼</span></div>
      <div class="cbody" id="bd-${cat.id}">${rows}</div>`;
    c.appendChild(b);
  });
}
function tg(id){document.getElementById('bd-'+id).classList.toggle('op');document.getElementById('cv-'+id).classList.toggle('op');}
function buildBar(it){
  if(it.mn===null||it.nlo===null||it.nhi===null||it.mx===null)return false;
  if(it.nhi>=900)return false;
  const total=it.mx-it.mn;if(total<=0)return false;
  const loW=Math.round((it.nlo-it.mn)/total*100);
  const nmW=Math.round((it.nhi-it.nlo)/total*100);
  const hiW=100-loW-nmW;
  document.getElementById('rtr').innerHTML=
    '<div style="flex:'+loW+';background:#aac4e0;"></div>'+
    '<div style="flex:'+nmW+';background:#7db87d;"></div>'+
    '<div style="flex:'+hiW+';background:#d9736a;"></div>';
  if(it.nv!==null){
    const pct=Math.min(97,Math.max(3,Math.round((it.nv-it.mn)/total*100)));
    document.getElementById('rmk').style.left=pct+'%';
    document.getElementById('rmk').style.display='block';
  } else document.getElementById('rmk').style.display='none';
  document.getElementById('rll').innerHTML=(it.lbl||[]).map(l=>'<span>'+l+'</span>').join('');
  return true;
}
function op(cid,nm){
  const cat=D.find(c=>c.id===cid);
  const it=cat.items.find(i=>i.n===nm);
  const s=it.st;
  const col=s==='ok'?'#2e7d32':s==='warn'?'#b5813a':'#c0392b';
  document.getElementById('pnm').textContent=it.n;
  document.getElementById('pv').textContent=it.v;
  document.getElementById('pv').style.color=col;
  document.getElementById('pu').textContent=it.u;
  const tag=document.getElementById('ptg');
  tag.textContent=s==='ok'?'정상 범위':s==='warn'?'주의 — 경계 수치':'관리 필요 — 높은 수치';
  tag.className='ptg '+(s==='ok'?'tok':s==='warn'?'twn':'tdk');
  const barOk=it.nv!==null&&buildBar(it);
  document.getElementById('rbo').style.display=barOk?'block':'none';
  document.getElementById('pm').textContent=it.m||'';
  const ab=document.getElementById('pa');
  ab.textContent=it.a||'';
  ab.className='ab '+(s==='ok'?'aok':s==='warn'?'awn':'adk');
  document.getElementById('pbg').classList.add('op');
}
function cp(e){if(!e||e.target===document.getElementById('pbg'))document.getElementById('pbg').classList.remove('op');}
build();
</script>

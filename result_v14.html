*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,'Malgun Gothic',sans-serif;color:var(--ink)}

input{width:100%;padding:16px;border-radius:16px;font-size:20px;border:1px solid #cfd6df;margin:16px 0}.lock button,.sheetClose{width:100%;padding:16px;border-radius:16px;font-size:20px}.lock button{border:0;background:#0f2340;color:#fff;font-weight:700}.sheetClose{margin-top:14px;width:100%;padding:15px 16px;border-radius:16px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:700;font-size:18px}
.small{font-size:13px;color:#6b7280}
</style></head>

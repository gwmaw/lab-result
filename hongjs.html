<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍재선 검사결과</title>
<style>
:root{--bg:#f4f2ee;--card:#fff;--ink:#0f2340;--muted:#667085;--line:#e5e7eb;--ok:#2e7d32;--warn:#b7791f;--bad:#c62828;--low:#2563eb}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,'Malgun Gothic',sans-serif;color:var(--ink)}
.wrap{max-width:860px;margin:0 auto;padding:28px 16px 80px}
h1{margin:0 0 8px;font-size:24px}.sub{color:#5b6b81}.note{text-align:center;color:#6a7280;margin:22px 0}
.catFold{background:#fff;border-radius:20px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.05);overflow:hidden}
.chead{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;list-style:none}.chead::-webkit-details-marker{display:none}
.title{font-size:22px;font-weight:800}.headRight{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.badge{padding:8px 12px;border-radius:999px;background:#f3f4f6;font-weight:700}
.countBadge{background:#eef2f7}.statusBadge.ok{background:#edf7ee;color:var(--ok)}.statusBadge.warn{background:#fff6e8;color:var(--warn)}.statusBadge.bad{background:#fdecec;color:var(--bad)}
.chev{font-size:20px;color:#667085;transition:transform .18s ease}.catFold[open] .chev{transform:rotate(180deg)}
.catBody{padding:0 18px 14px 18px;border-top:1px solid var(--line)}
.item{border-top:1px solid var(--line);padding:10px 0}.item:first-child{border-top:0}
.itemWarn .itemBtn{border-left:4px solid var(--warn);padding-left:10px}.itemBad .itemBtn{border-left:4px solid var(--bad);padding-left:10px}
.itemBtn{display:block;width:100%;text-align:left;background:transparent;border:0;padding:0;cursor:pointer}.itemBtn:focus-visible{outline:2px solid #94a3b8;outline-offset:2px;border-radius:12px}
.itemTop{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center}.itemNm{min-width:0;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.itemVal{font-size:22px;font-weight:800;display:flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0}.valueTri{color:var(--bad);font-size:.9em;font-weight:900;line-height:1}.valueTri.down{color:var(--low)}
.meta{color:var(--muted);font-size:14px;margin-top:4px}
@media (max-width: 640px){.wrap{padding:18px 12px 72px}h1{font-size:22px}.note{margin:18px 0}.chead{padding:14px 14px}.title{font-size:18px}.catBody{padding:0 14px 12px 14px}.item{padding:12px 0}.itemNm{font-size:16px}.itemVal{font-size:16px}.meta{font-size:13px}.sheet{width:100%;max-height:94vh;padding:14px 16px 20px}.sheetName{font-size:17px}.sheetValue{font-size:30px}.sheetUnit{font-size:18px}.lockCard{padding:24px 20px;border-radius:24px}.lockBrand img{max-width:260px}}
.tri{color:var(--bad);font-size:14px;line-height:1}.triOff{opacity:.14}.catWarn{color:var(--bad);margin-right:4px;font-size:16px}
.trendWrap{margin:6px 0 12px;padding:12px;border-radius:14px;background:#faf7f0;border:1px solid #f0e2c8}.trendTitle{font-weight:800;margin-bottom:6px;color:#7a4d09}.trendSvg{width:100%;height:auto;display:block;overflow:visible}.trendRef,.trendEmpty{font-size:13px;color:#8a6a3d;margin-top:4px}.histTitle{margin-top:8px}.expGrid{display:grid;gap:10px;margin:12px 0 10px}.expBox{border-radius:14px;padding:12px 14px}.expBox h4{margin:0 0 6px;font-size:15px}.expBox p{margin:0;color:#344054;line-height:1.65}.expWhat{background:#f8fafc;border:1px solid #e5e7eb}.expMean{background:#fff7ed;border:1px solid #fed7aa}.expAction{background:#eff6ff;border:1px solid #bfdbfe}
.sheetOverlay{position:fixed;inset:0;background:rgba(15,23,42,.28);display:none;align-items:flex-end;justify-content:center;padding:0;z-index:50}.sheetOverlay.show{display:flex}.sheet{width:min(100%,560px);max-height:92vh;overflow:auto;background:#fff;border-radius:28px 28px 0 0;padding:14px 18px 20px;box-shadow:0 -12px 40px rgba(0,0,0,.18)}.sheetTopHandle{width:52px;height:5px;border-radius:999px;background:#d1d5db;margin:0 auto 18px}.sheetName{font-size:18px;font-weight:800;margin-bottom:8px}.sheetValueRow{display:flex;align-items:flex-end;gap:8px}.sheetValue{font-size:28px;font-weight:800;color:#b45309}.sheetUnit{font-size:18px;color:#6b7280;font-weight:500}.pill{display:inline-block;margin:12px 0 8px;padding:8px 12px;border-radius:999px;font-weight:700}.pill.ok{background:#edf7ee;color:var(--ok)}.pill.warn{background:#fff6e8;color:var(--warn)}.pill.bad{background:#fdecec;color:var(--bad)}.sheetClose{margin-top:14px;width:100%;padding:15px 16px;border-radius:16px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:700;font-size:18px}
.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}.lockCard{max-width:460px;width:100%;background:#fff;border-radius:28px;padding:28px;box-shadow:0 16px 40px rgba(0,0,0,.08);text-align:center}
input{width:100%;padding:16px;border-radius:16px;font-size:20px;border:1px solid #cfd6df;margin:16px 0}.lock button,.sheetClose{width:100%;padding:16px;border-radius:16px;font-size:20px}.lock button{border:0;background:#0f2340;color:#fff;font-weight:700}.sheetClose{margin-top:14px;width:100%;padding:15px 16px;border-radius:16px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:700;font-size:18px}
.small{font-size:13px;color:#6b7280}
</style></head>

<script>
(function(){
  let tries = 0;
  const pin = document.getElementById('pin');
  const btn = document.getElementById('unlockBtn');
  const msg = document.getElementById('lockMsg');
  btn.onclick = function(){
    const v = String(pin.value || '').replace(/D/g,'');
    const target = '19630815';
    if (tries >= 5){ msg.textContent = '입력 제한 횟수를 초과했습니다.'; return; }
    if (v.length !== 8){ msg.textContent = '생년월일 8자리를 입력해 주세요.'; return; }
    if (v === target){ document.getElementById('lockLayer').style.display = 'none'; }
    else { tries += 1; msg.textContent = '생년월일이 일치하지 않습니다. (' + tries + '/5)'; }
  };
  pin.addEventListener('keydown', function(e){ if (e.key === 'Enter') btn.click(); });
})();
</script>
<script>
(function(){
  const overlay = document.getElementById('sheetOverlay');
  const panel = document.getElementById('sheetPanel');
  function closeSheet(){ overlay.classList.remove('show'); overlay.setAttribute('aria-hidden','true'); panel.innerHTML=''; document.body.style.overflow=''; }
  document.addEventListener('click', function(e){
    const btn = e.target.closest('.itemBtn');
    if (btn){
      const tpl = document.getElementById(btn.getAttribute('data-modal-id'));
      if (!tpl) return;
      panel.innerHTML = tpl.innerHTML + '<button type="button" class="sheetClose">닫기</button>';
      overlay.classList.add('show'); overlay.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden';
      return;
    }
    if (e.target === overlay || e.target.closest('.sheetClose')) closeSheet();
  });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeSheet(); });
})();
</script>

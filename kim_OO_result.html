<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검사결과 확인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f8f7f5;color:#1a1a1a;}
#lock-screen{position:fixed;inset:0;background:#f8f7f5;z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.lock-box{background:#fff;border-radius:16px;border:1px solid #e0ddd8;padding:2rem 1.5rem;width:100%;max-width:360px;text-align:center;}
.lock-icon{font-size:44px;margin-bottom:1rem;}
.lock-title{font-size:18px;font-weight:500;margin-bottom:6px;}
.lock-sub{font-size:14px;color:#888;margin-bottom:1.5rem;line-height:1.7;}
.lock-label{font-size:13px;color:#555;text-align:left;margin-bottom:6px;font-weight:500;}
.lock-input{width:100%;padding:14px;border:1.5px solid #e0ddd8;border-radius:10px;font-size:20px;text-align:center;letter-spacing:6px;color:#1a1a1a;outline:none;transition:border .2s;}
.lock-input:focus{border-color:#6b8cce;}
.lock-input.error{border-color:#c0392b;animation:shake .3s;}
.lock-btn{width:100%;margin-top:14px;padding:14px;background:#3d5a9e;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;}
.lock-btn:hover{background:#2d4a8e;}
.lock-btn:disabled{background:#ccc;cursor:default;}
.lock-error{color:#c0392b;font-size:13px;margin-top:10px;min-height:18px;}
.lock-attempts{color:#aaa;font-size:12px;margin-top:6px;min-height:16px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#result-screen{display:none;}
.wrap{max-width:480px;margin:0 auto;padding:1rem;}
.ph{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;border:1px solid #e0ddd8;}
.ph-name{font-size:19px;font-weight:500;}
.ph-sub{font-size:13px;color:#888;margin-top:3px;}
.notice{background:#f0f4ff;border-left:3px solid #6b8cce;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:.75rem;font-size:13px;color:#3d5a9e;line-height:1.6;}
.cb{background:#fff;border:1px solid #e0ddd8;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.cb.has-danger{border-left:4px solid #c0392b;}
.cb.has-warn{border-left:4px solid #b5813a;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.ch:hover{background:#faf9f7;}
.cl{display:flex;align-items:center;gap:10px;}
.ci{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:#f3f2ef;}
.ct{font-size:15px;font-weight:500;}
.cbadge{font-size:12px;padding:3px 10px;border-radius:99px;margin-left:6px;font-weight:500;}
.bok{background:#e8f5e9;color:#2e7d32;}
.bwarn{background:#fff3e0;color:#b5813a;}
.bdanger{background:#fdecea;color:#c0392b;font-weight:700;}
.chev{font-size:11px;color:#aaa;transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.cbody{border-top:1px solid #f0ede8;display:none;}
.cbody.open{display:block;}
.ir{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f5f3f0;cursor:pointer;}
.ir:last-child{border-bottom:none;}
.ir.danger-row{background:#fdf5f5;}
.ir:hover{background:#faf9f7;}
.in{font-size:15px;font-weight:500;}
.is{font-size:12px;color:#999;margin-top:2px;}
.irr{display:flex;align-items:center;gap:6px;}
.iv{font-size:16px;font-weight:500;}
.vok{color:#2e7d32;}
.vwarn{color:#b5813a;}
.vdanger{color:#c0392b;font-size:17px;}
.iu{font-size:12px;color:#aaa;}
.ia{font-size:14px;color:#ccc;}
.danger-mark{font-size:14px;color:#c0392b;margin-right:2px;font-weight:700;}
.pbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.pbg.open{display:flex;}
.pop{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;}
.pop-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 1.25rem;}
.pname{font-size:18px;font-weight:500;margin-bottom:6px;}
.pvrow{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.pval{font-size:32px;font-weight:500;}
.punit{font-size:14px;color:#888;}
.ptag{display:inline-block;font-size:13px;padding:4px 12px;border-radius:99px;font-weight:500;margin-bottom:14px;}
.tok{background:#e8f5e9;color:#2e7d32;}
.twarn{background:#fff3e0;color:#b5813a;}
.tdanger{background:#fdecea;color:#c0392b;}
.rbo{position:relative;margin-bottom:6px;}
.rtrack{display:flex;height:12px;border-radius:99px;overflow:hidden;}
.rmarker{position:absolute;top:-4px;width:4px;height:20px;background:#1a1a1a;border-radius:2px;transform:translateX(-50%);}
.rlabels{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:5px;}
.rlegend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;margin-bottom:16px;}
.lgi{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;}
.lgd{width:10px;height:10px;border-radius:50%;}
.divider{height:1px;background:#f0ede8;margin:4px 0 14px;}
.st{font-size:12px;font-weight:500;color:#aaa;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;}
.mb{background:#f8f7f5;border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:15px;color:#333;line-height:1.7;}
.ab{border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:15px;line-height:1.7;}
.aok{background:#e8f5e9;color:#1b5e20;}
.awarn{background:#fff3e0;color:#8a5c00;}
.adanger{background:#fdecea;color:#922b21;}
/* 그래프 */
.graph-wrap{width:100%;margin-bottom:6px;}
.graph-svg{width:100%;overflow:visible;display:block;}
.graph-note{font-size:11px;color:#bbb;margin-bottom:14px;}
.trend-line{fill:none;stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;}
.cb2{width:100%;padding:14px;border-radius:10px;border:1px solid #ddd;background:#f8f7f5;color:#333;font-size:15px;cursor:pointer;font-weight:500;}
.cb2:hover{background:#f0ede8;}
.footer{text-align:center;font-size:12px;color:#bbb;padding:1.5rem 0 2rem;line-height:1.8;}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">검사결과 확인</div>
    <div class="lock-sub">본인 확인을 위해<br>생년월일 8자리를 입력해 주세요<br><span style="font-size:12px;color:#bbb;">예) 1950년 12월 31일 → 19501231</span></div>

<div id="result-screen">

    <div class="ph">

  </div>
</div>

<div class="pbg" id="pbg" onclick="cp(event)">
  <div class="pop">
    <div class="pop-handle"></div>
    <div class="pname" id="pn"></div>
    <div class="pvrow"><span class="pval" id="pv"></span><span class="punit" id="pu"></span></div>
    <div class="ptag" id="ptag"></div>
    <div class="rbo" id="rbo">
      <div class="rtrack" id="rtrack"></div>
      <div class="rmarker" id="rmk"></div>
    </div>
    <div class="rlabels" id="rlbl"></div>
    <div class="rlegend">
      <div class="lgi"><div class="lgd" style="background:#aac4e0"></div>낮음</div>
      <div class="lgi"><div class="lgd" style="background:#7db87d"></div>정상</div>
      <div class="lgi"><div class="lgd" style="background:#d9736a"></div>높음</div>

    <div class="divider"></div>

    <div class="st">어떻게 하면 좋을까요?</div>

  </div>
</div>

<script>
// ★ 환자 생년월일
const CORRECT_DOB = '19501231';
let attempts = 0;
const MAX = 5;

function checkDOB(){
  const val=document.getElementById('dob-input').value.trim();
  const errEl=document.getElementById('lock-error');
  const attEl=document.getElementById('lock-attempts');
  const inp=document.getElementById('dob-input');
  if(val.length!==8){errEl.textContent='8자리를 모두 입력해 주세요.';return;}
  if(val===CORRECT_DOB){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('result-screen').style.display='block';
  } else {
    attempts++;
    inp.value=''; inp.classList.add('error');
    setTimeout(()=>inp.classList.remove('error'),400);
    const left=MAX-attempts;
    if(left<=0){errEl.textContent='5회 오류로 잠겼습니다. 진료실에 문의해 주세요.';document.getElementById('lock-btn').disabled=true;attEl.textContent='';}
    else{errEl.textContent='생년월일이 맞지 않아요.';attEl.textContent=`남은 시도: ${left}회`;}
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('dob-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkDOB();});
});

// ── 추이 그래프 ──
function drawTrendGraph(svgId, data, nlo, nhi, color){
  const svg=document.getElementById(svgId);
  svg.innerHTML='';
  if(!data||data.length<2){document.getElementById('ptw').style.display='none';return;}
  const W=svg.parentElement.offsetWidth||340;
  svg.setAttribute('viewBox',`0 0 ${W} 110`);
  const PAD_L=34,PAD_R=20,PAD_T=22,PAD_B=28;
  const gW=W-PAD_L-PAD_R, gH=110-PAD_T-PAD_B;
  const vals=data.map(d=>parseFloat(d.v));
  const allV=[...vals];
  if(nlo!=null) allV.push(nlo);
  if(nhi!=null) allV.push(nhi);
  let vMin=Math.min(...allV)*0.85;
  let vMax=Math.max(...allV)*1.12;
  if(vMin<0) vMin=0;
  const toY=v=>PAD_T+gH-(((v-vMin)/(vMax-vMin))*gH);
  const toX=i=>PAD_L+(i/(data.length-1))*gW;

  const ns='http://www.w3.org/2000/svg';
  function el(tag,attrs){const e=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;}

  // 정상구간 배경
  if(nlo!=null&&nhi!=null){
    const yTop=toY(nhi), yBot=toY(nlo);
    svg.appendChild(el('rect',{x:PAD_L,y:yTop,width:gW,height:Math.max(0,yBot-yTop),fill:'#f0faf0',rx:3}));
    svg.appendChild(el('text',{x:PAD_L-2,y:yBot+4,'text-anchor':'end','font-size':9,fill:'#bbb'})).textContent=nlo;
    svg.appendChild(el('text',{x:PAD_L-2,y:yTop+4,'text-anchor':'end','font-size':9,fill:'#bbb'})).textContent=nhi;
  }

  // 추이선
  const pts=data.map((d,i)=>`${toX(i)},${toY(parseFloat(d.v))}`).join(' ');
  svg.appendChild(el('polyline',{points:pts,class:'trend-line',stroke:color}));

  // 점 + 라벨
  data.forEach((d,i)=>{
    const x=toX(i), y=toY(parseFloat(d.v));
    const isLast=i===data.length-1;
    svg.appendChild(el('circle',{cx:x,cy:y,r:isLast?6:4,fill:isLast?color:'#ccc',stroke:'#fff','stroke-width':2}));
    // 수치 (첫번째, 마지막만)
    if(isLast||i===0){
      const t=el('text',{x,y:y-10,'text-anchor':'middle','font-size':11,'font-weight':'500',fill:isLast?color:'#999'});
      t.textContent=d.v; svg.appendChild(t);
    }
    // 날짜
    const dt=el('text',{x,y:110-6,'text-anchor':'middle','font-size':10,fill:'#aaa'});
    dt.textContent=d.d; svg.appendChild(dt);
  });
}

// ── 바 차트 ──
function buildBar(it){
  const{mn,nlo,nhi,mx,nv}=it;
  const total=mx-mn;
  const loW=Math.round((nlo-mn)/total*100);
  const normW=Math.round((nhi-nlo)/total*100);
  const hiW=100-loW-normW;
  document.getElementById('rtrack').innerHTML=
    `<div style="flex:${loW};background:#aac4e0;"></div>`+
    `<div style="flex:${normW};background:#7db87d;"></div>`+
    `<div style="flex:${hiW};background:#d9736a;"></div>`;
  const pct=Math.min(97,Math.max(3,Math.round((nv-mn)/total*100)));
  document.getElementById('rmk').style.left=pct+'%';
  document.getElementById('rlbl').innerHTML=(it.lbl||[]).map(l=>`<span>${l}</span>`).join('');
}

  {id:'dm',icon:'🍬',title:'당뇨 검사',items:[
    {n:'혈당 (Glucose)',s2:'혈액 속 포도당',v:'169',u:'mg/dL',mn:0,nlo:70,nhi:99,mx:250,nv:169,st:'danger',lbl:['0','70(낮음)','99(높음)','250+'],tr:[{d:'25.03',v:'127'},{d:'25.09',v:'145'},{d:'26.03',v:'169'}],m:'혈액 속 당분의 양이에요. 공복 기준 126 이상이면 당뇨 진단 기준이에요.',a:'높아요. 점점 올라가는 추세예요. 단 음식·흰쌀밥·밀가루를 줄이고 규칙적으로 걷기 운동을 해주세요. 선생님과 치료 계획을 꼭 상담하세요.'},

function ov(items){if(items.some(i=>i.st==='danger'))return'danger';if(items.some(i=>i.st==='warn'))return'warn';return'ok';}
function bl(s){return s==='ok'?'정상':s==='warn'?'주의':'관리 필요';}

function build(){
  const c=document.getElementById('cats');
  D.forEach(cat=>{
    const os=ov(cat.items);
    const b=document.createElement('div');
    b.className='cb'+(os==='danger'?' has-danger':os==='warn'?' has-warn':'');
    const rows=cat.items.map(it=>`
      <div class="ir${it.st==='danger'?' danger-row':''}" onclick="op('${cat.id}','${it.n.replace(/'/g,"\\'")}')">
        <div style="display:flex;align-items:center;gap:8px;">
          ${it.st==='danger'?'<span class="danger-mark">!</span>':''}
          <div><div class="in">${it.n}</div><div class="is">${it.s2}</div></div>
        </div>
        <div class="irr">
          <span class="iv v${it.st}">${it.v}</span>
          <span class="iu">${it.u}</span>
          <span class="ia">›</span>
        </div>
      </div>`).join('');
    b.innerHTML=`
      <div class="ch" onclick="tg('${cat.id}')">
        <div class="cl"><div class="ci">${cat.icon}</div><span class="ct">${cat.title}</span><span class="cbadge b${os}">${bl(os)}</span></div>
        <span class="chev" id="cv-${cat.id}">▼</span>
      </div>
      <div class="cbody" id="bd-${cat.id}">${rows}</div>`;
    c.appendChild(b);
  });
}

function tg(id){
  document.getElementById('bd-'+id).classList.toggle('open');
  document.getElementById('cv-'+id).classList.toggle('open');
}

function op(cid,nm){
  const cat=D.find(c=>c.id===cid);
  const it=cat.items.find(i=>i.n===nm);
  const s=it.st;
  const col=s==='ok'?'#2e7d32':s==='warn'?'#b5813a':'#c0392b';
  document.getElementById('pn').textContent=it.n;
  document.getElementById('pv').textContent=it.v;
  document.getElementById('pv').style.color=col;
  document.getElementById('pu').textContent=it.u;
  const tag=document.getElementById('ptag');
  tag.textContent=s==='ok'?'정상 범위':s==='warn'?'주의 — 경계 수치':'관리 필요 — 높은 수치';
  tag.className='ptag t'+s;

  if(it.nv!==null&&it.mn!==null){
    document.getElementById('rbo').style.display='block';
    buildBar(it);
  } else {
    document.getElementById('rbo').style.display='none';
  }

  const tw=document.getElementById('ptw');
  if(it.tr&&it.tr.length>=2){
    tw.style.display='block';
    // 그래프 렌더 (팝업 열린 후 너비 계산 위해 setTimeout)
    setTimeout(()=>{
      drawTrendGraph('trend-svg', it.tr, it.nlo||null, it.nhi||null, col);
    }, 50);
    document.getElementById('graph-note').textContent=`정상 범위: ${it.nlo||'—'} ~ ${it.nhi||'—'} ${it.u}`;
  } else {
    tw.style.display='none';
  }

  document.getElementById('pm').textContent=it.m;
  const ab=document.getElementById('pa');
  ab.textContent=it.a;
  ab.className='ab a'+s;
  document.getElementById('pbg').classList.add('open');
}

function cp(e){
  if(!e||e.target===document.getElementById('pbg'))
    document.getElementById('pbg').classList.remove('open');
}

build();
</script>

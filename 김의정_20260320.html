<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검사결과 확인 — 더봄연합내과의원</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #f5f5f5; }
  #lock-screen {
    position: fixed; inset: 0; background: #1a237e;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
  }
  #lock-screen h1 { color: white; font-size: 1.3rem; margin-bottom: 8px; }
  #lock-screen p { color: #aac4ff; font-size: 0.85rem; margin-bottom: 24px; }
  #lock-screen input {
    width: 200px; padding: 12px; font-size: 1.4rem; text-align: center;
    border: 2px solid #5c6bc0; border-radius: 8px; outline: none; letter-spacing: 4px;
  }
  #lock-screen button {
    margin-top: 14px; padding: 10px 36px; background: #3949ab; color: white;
    border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
  }
  #lock-msg { color: #ff8a80; margin-top: 10px; font-size: 0.85rem; min-height: 20px; }
  #main { display: none; max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }
  .hospital-header {
    background: #1a237e; color: white; border-radius: 12px 12px 0 0;
    padding: 18px 20px 14px; margin-bottom: 2px;
  }
  .hospital-header h2 { font-size: 1.15rem; }
  .hospital-header p { font-size: 0.78rem; opacity: 0.75; margin-top: 2px; }
  .notice-box {
    background: #e3f2fd; border-left: 4px solid #1565c0;
    padding: 12px 16px; margin: 10px 0; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: #1565c0;
  }
  .summary-box {
    background: white; border: 1px solid #e0e0e0; border-radius: 10px;
    padding: 16px; margin: 10px 0; font-size: 0.9rem; line-height: 1.7; color: #333;
  }
  .summary-box h3 { font-size: 0.95rem; color: #1a237e; margin-bottom: 8px; }
  .test-badge {
    display: inline-block; background: #ff7043; color: white;
    font-size: 0.75rem; font-weight: bold; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock-screen">
  <h1>🏥 더봄연합내과의원</h1>
  <p>생년월일 8자리를 입력해주세요 (예: 19801215)</p>
  <input type="password" id="dob-input" maxlength="8" inputmode="numeric" placeholder="">
  <button onclick="checkDob()">확인</button>
  <p id="lock-msg"></p>
</div>

<!-- 메인 화면 -->
<div id="main">
  <div class="hospital-header">
    <h2>🏥 더봄연합내과의원</h2>
    <p>THE VOM UNION INTERNAL MEDICINE · 검사결과 안내</p>
  </div>
  <div class="notice-box">
    📋 본 결과지는 담당 의사의 검토를 거친 결과입니다. 궁금한 점은 내원 또는 전화 문의해주세요.
  </div>
  <div class="summary-box">
    <h3>📝 종합 소견</h3>
    <span class="test-badge">테스트 발송</span>
    <p>이 결과지는 알림톡 자동발송 시스템 테스트용으로 생성된 파일입니다.<br>
    실제 검사 결과가 아니며, 시스템 정상 작동 확인 목적으로만 사용됩니다.</p>
  </div>
</div>

<script>
const DOB='19841217';
let attempts = 0;
document.getElementById('dob-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkDob();
});
function checkDob() {
  const v = document.getElementById('dob-input').value.trim();
  if (v === DOB) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } else {
    attempts++;
    const msg = document.getElementById('lock-msg');
    if (attempts >= 5) {
      msg.textContent = '입력 횟수 초과. 잠시 후 다시 시도해주세요.';
      document.getElementById('dob-input').disabled = true;
      setTimeout(() => { attempts = 0; document.getElementById('dob-input').disabled = false; msg.textContent=''; }, 30000);
    } else {
      msg.textContent = `생년월일이 일치하지 않습니다. (${attempts}/5)`;
    }
    document.getElementById('dob-input').value = '';
  }
}
</script>
</body>
</html>
